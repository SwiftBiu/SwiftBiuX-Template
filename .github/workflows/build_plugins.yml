name: Build and Release Versioned Plugins

on:
  push:
    tags:
      - "v*" # Trigger on tags like v0.1.0, v1.0.0, etc.
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-release:
    runs-on: macos-latest
    # Run on v* tags or on pushes to main with "[release]" in the commit message
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]'))
    permissions:
      contents: write # Grant write permission to create/delete releases and tags

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git log

      - name: Create distribution directory
        run: mkdir -p dist

      - name: Build all plugins
        run: ./scripts/build_plugin.sh --all --output-dir dist

      - name: Generate plugins.json catalog
        run: node scripts/generate_catalog.js

      - name: Validate extension kind and catalog channels
        run: node scripts/test_extension_channels.js

      - name: Prepare gh-pages stable payload
        run: |
          mkdir -p catalog-stable
          cp catalog/plugins.json catalog-stable/plugins.json
          cp catalog/webPlugins.json catalog-stable/webPlugins.json

      - name: Deploy Catalog to gh-pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./catalog-stable
          publish_branch: gh-pages
          keep_files: true
          force_orphan: false # Keep history on gh-pages if desired, or true to keep it small
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "chore: Update plugin catalog [skip ci]"

      - name: List packaged assets
        run: |
          echo "Contents of dist directory:"
          find dist -maxdepth 1 -name '*.swiftbiux' -print | sort

      - name: Determine Release Tag and Type
        id: determine_tag
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "TITLE=Release ${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            TAG="nightly-$(date +%Y%m%d-%H%M%S)"
            echo "TAG=${TAG}" >> $GITHUB_OUTPUT
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "TITLE=Nightly Build ${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Git Tag
        if: steps.determine_tag.outputs.PRERELEASE == 'true'
        run: |
          git tag ${{ steps.determine_tag.outputs.TAG }}
          git push origin ${{ steps.determine_tag.outputs.TAG }}

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.determine_tag.outputs.TAG }} \
            --title "${{ steps.determine_tag.outputs.TITLE }}" \
            --generate-notes \
            ${{ steps.determine_tag.outputs.PRERELEASE == 'true' && '--prerelease' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload plugin assets to release
        run: gh release upload ${{ steps.determine_tag.outputs.TAG }} dist/*.swiftbiux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
