<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nano Banana</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: linear-gradient(145deg, rgba(252, 244, 234, 0.96), rgba(247, 239, 228, 0.86));
            --panel: rgba(255, 252, 248, 0.86);
            --panel-strong: rgba(255, 255, 255, 0.9);
            --border: rgba(88, 64, 35, 0.12);
            --border-strong: rgba(88, 64, 35, 0.2);
            --text: #2c2016;
            --muted: #7d6653;
            --accent: #d26f32;
            --accent-strong: #b65318;
            --success: #1f8b5b;
            --warning: #a86818;
            --error: #b63434;
            --shadow: 0 24px 60px rgba(88, 57, 20, 0.16);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: linear-gradient(145deg, rgba(31, 21, 16, 0.98), rgba(21, 16, 12, 0.92));
                --panel: rgba(43, 31, 23, 0.84);
                --panel-strong: rgba(58, 43, 32, 0.9);
                --border: rgba(255, 235, 215, 0.09);
                --border-strong: rgba(255, 235, 215, 0.16);
                --text: #f6ecdf;
                --muted: #c7b4a2;
                --accent: #f09a52;
                --accent-strong: #ffb270;
                --success: #6ad5a4;
                --warning: #f0bf72;
                --error: #ff918f;
                --shadow: 0 28px 72px rgba(0, 0, 0, 0.35);
            }
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            color: var(--text);
            font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", system-ui, sans-serif;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            pointer-events: none;
            filter: blur(24px);
            opacity: 0.55;
        }

        body::before {
            width: 220px;
            height: 220px;
            top: -60px;
            right: -40px;
            background: radial-gradient(circle, rgba(240, 154, 82, 0.65), rgba(240, 154, 82, 0));
        }

        body::after {
            width: 240px;
            height: 240px;
            bottom: -90px;
            left: -70px;
            background: radial-gradient(circle, rgba(91, 169, 150, 0.35), rgba(91, 169, 150, 0));
        }

        .app {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100%;
            background: var(--bg);
            backdrop-filter: blur(32px) saturate(160%);
            -webkit-backdrop-filter: blur(32px) saturate(160%);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px 14px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .eyebrow {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(210, 111, 50, 0.12);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .eyebrow-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: currentColor;
            box-shadow: 0 0 0 6px rgba(210, 111, 50, 0.12);
        }

        .title {
            font-size: 24px;
            line-height: 1.05;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        button {
            appearance: none;
            border: none;
            cursor: pointer;
            transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease, border-color 0.16s ease;
            font: inherit;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 40px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--border-strong);
            background: rgba(255, 255, 255, 0.42);
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: white;
            border-color: transparent;
        }

        .workspace {
            min-height: 0;
            padding: 0 18px 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: minmax(300px, 340px) minmax(0, 1fr);
            gap: 16px;
            height: 100%;
            min-height: 0;
        }

        .panel {
            min-height: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            background: var(--panel);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px 12px;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 800;
        }

        .panel-note {
            font-size: 12px;
            color: var(--muted);
        }

        .prompt-wrap {
            padding: 0 18px 16px;
        }

        .prompt-input {
            width: 100%;
            min-height: 220px;
            resize: none;
            padding: 16px 18px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--panel-strong);
            color: var(--text);
            line-height: 1.6;
            font-size: 14px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .prompt-input:focus {
            outline: none;
            border-color: rgba(210, 111, 50, 0.42);
            box-shadow: 0 0 0 4px rgba(210, 111, 50, 0.12);
        }

        .prompt-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
            color: var(--muted);
            font-size: 12px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 18px 18px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.34);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .chip strong {
            color: var(--text);
            font-weight: 700;
        }

        .logs {
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.08);
        }

        .logs-body {
            min-height: 0;
            overflow: auto;
            padding: 0 14px 14px;
        }

        .log-entry {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            padding: 11px 4px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.08);
            font-size: 12px;
            line-height: 1.45;
        }

        .log-time {
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .log-entry.is-success .log-message {
            color: var(--success);
        }

        .log-entry.is-warning .log-message {
            color: var(--warning);
        }

        .log-entry.is-error .log-message {
            color: var(--error);
        }

        .preview-panel {
            position: relative;
            padding: 14px;
            gap: 14px;
        }

        .preview-shell {
            position: relative;
            min-height: 340px;
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: calc(var(--radius-xl) - 6px);
            overflow: hidden;
            background:
                radial-gradient(circle at top right, rgba(240, 154, 82, 0.18), transparent 32%),
                radial-gradient(circle at bottom left, rgba(91, 169, 150, 0.16), transparent 26%),
                linear-gradient(145deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.16));
            border: 1px solid var(--border);
        }

        .preview-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            background: rgba(255, 255, 255, 0.4);
        }

        .placeholder,
        .loading-state,
        .error-state {
            max-width: 440px;
            text-align: center;
            padding: 24px;
        }

        .placeholder-title,
        .response-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .placeholder-copy,
        .response-copy,
        .meta-list,
        .error-copy {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .loading-state {
            display: none;
        }

        .spinner {
            width: 34px;
            height: 34px;
            margin: 0 auto 12px;
            border-radius: 999px;
            border: 3px solid rgba(210, 111, 50, 0.18);
            border-top-color: var(--accent);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .response-panel,
        .meta-panel {
            border: 1px solid var(--border);
            border-radius: calc(var(--radius-xl) - 8px);
            background: rgba(255, 255, 255, 0.24);
            padding: 14px 16px;
        }

        .response-panel {
            display: none;
        }

        .response-copy {
            white-space: pre-wrap;
        }

        .meta-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 16px;
        }

        .meta-item span {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.72;
            margin-bottom: 4px;
        }

        .meta-item strong {
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
        }

        .mini-btn {
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.35);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(127, 100, 69, 0.22);
            border-radius: 999px;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
                overflow: auto;
            }

            .panel {
                min-height: 0;
            }

            .prompt-input {
                min-height: 160px;
            }

            .meta-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <div class="eyebrow">
                    <span class="eyebrow-dot"></span>
                    Nano Banana Workspace
                </div>
                <div class="title">图片结果工作台</div>
                <div class="subtitle" id="status-line">准备接收 prompt</div>
            </div>
            <div class="actions">
                <button class="btn" id="copy-prompt-btn">复制 Prompt</button>
                <button class="btn" id="save-btn" disabled>保存原图</button>
                <button class="btn" id="share-btn" disabled>导出分享海报</button>
                <button class="btn btn-primary" id="generate-btn">重新生成</button>
            </div>
        </header>

        <main class="workspace">
            <div class="grid">
                <section class="panel">
                    <div class="panel-head">
                        <div>
                            <div class="panel-title">Prompt</div>
                            <div class="panel-note">可直接编辑，按 `Cmd/Ctrl + Enter` 立即重新生成</div>
                        </div>
                    </div>

                    <div class="prompt-wrap">
                        <textarea id="prompt-input" class="prompt-input" placeholder="输入或修改 prompt，然后点击重新生成。"></textarea>
                        <div class="prompt-footer">
                            <span id="prompt-counter">0 字</span>
                            <span id="request-counter">等待生成</span>
                        </div>
                    </div>

                    <div class="chips">
                        <div class="chip"><strong>模型</strong><span id="chip-model">-</span></div>
                        <div class="chip"><strong>比例</strong><span id="chip-aspect">-</span></div>
                        <div class="chip"><strong>尺寸</strong><span id="chip-size">-</span></div>
                    </div>

                    <div class="logs">
                        <div class="panel-head">
                            <div>
                                <div class="panel-title">响应日志</div>
                                <div class="panel-note">记录请求开始、响应状态、错误和结果摘要</div>
                            </div>
                        </div>
                        <div class="logs-body" id="logs-body"></div>
                    </div>
                </section>

                <section class="panel preview-panel">
                    <div class="preview-shell">
                        <img id="preview-image" class="preview-media" alt="Generated image preview">

                        <div class="placeholder" id="placeholder-state">
                            <div class="placeholder-title">等待结果</div>
                            <div class="placeholder-copy">当前窗口会展示图片、响应文字、请求日志，以及导出分享海报所需的信息。</div>
                        </div>

                        <div class="loading-state" id="loading-state">
                            <div class="spinner"></div>
                            <div class="placeholder-title">正在生成图片</div>
                            <div class="placeholder-copy">请求已经发出，窗口会在响应返回后自动更新。</div>
                        </div>

                        <div class="error-state" id="error-state" style="display:none;">
                            <div class="placeholder-title">这次没有拿到图片</div>
                            <div class="error-copy" id="error-copy"></div>
                        </div>
                    </div>

                    <section class="response-panel" id="response-panel">
                        <div class="response-title">响应文字</div>
                        <div class="response-copy" id="response-copy"></div>
                    </section>

                    <section class="meta-panel">
                        <div class="panel-title" style="margin-bottom: 12px;">结果信息</div>
                        <div class="meta-list">
                            <div class="meta-item">
                                <span>状态</span>
                                <strong id="meta-status">Idle</strong>
                            </div>
                            <div class="meta-item">
                                <span>耗时</span>
                                <strong id="meta-duration">-</strong>
                            </div>
                            <div class="meta-item">
                                <span>最后完成</span>
                                <strong id="meta-finished-at">-</strong>
                            </div>
                            <div class="meta-item">
                                <span>响应类型</span>
                                <strong id="meta-response-kind">-</strong>
                            </div>
                        </div>
                    </section>
                </section>
            </div>
        </main>
    </div>

    <script>
        const dom = {
            statusLine: document.getElementById("status-line"),
            promptInput: document.getElementById("prompt-input"),
            promptCounter: document.getElementById("prompt-counter"),
            requestCounter: document.getElementById("request-counter"),
            chipModel: document.getElementById("chip-model"),
            chipAspect: document.getElementById("chip-aspect"),
            chipSize: document.getElementById("chip-size"),
            logsBody: document.getElementById("logs-body"),
            generateBtn: document.getElementById("generate-btn"),
            copyPromptBtn: document.getElementById("copy-prompt-btn"),
            saveBtn: document.getElementById("save-btn"),
            shareBtn: document.getElementById("share-btn"),
            previewImage: document.getElementById("preview-image"),
            placeholderState: document.getElementById("placeholder-state"),
            loadingState: document.getElementById("loading-state"),
            errorState: document.getElementById("error-state"),
            errorCopy: document.getElementById("error-copy"),
            responsePanel: document.getElementById("response-panel"),
            responseCopy: document.getElementById("response-copy"),
            metaStatus: document.getElementById("meta-status"),
            metaDuration: document.getElementById("meta-duration"),
            metaFinishedAt: document.getElementById("meta-finished-at"),
            metaResponseKind: document.getElementById("meta-response-kind")
        };

        const modelLabels = {
            "gemini-3.1-flash-image-preview": "Gemini 3.1 Flash Image",
            "gemini-3-pro-image-preview": "Gemini 3 Pro Image",
            "gemini-2.5-flash-image": "Nano Banana (2.5 Flash)"
        };

        const state = {
            apiKey: "",
            model: "gemini-2.5-flash-image",
            aspectRatio: "1:1",
            imageSize: "1K",
            prompt: "",
            imageBase64: "",
            imageMimeType: "image/png",
            responseText: "",
            error: "",
            logs: [],
            requestCounter: 0,
            activeRequestId: 0,
            isLoading: false,
            lastDurationMs: null,
            lastFinishedAt: "",
            settingsLoaded: false
        };

        let settingsPromise = null;

        function timestamp() {
            return new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            });
        }

        function formatDuration(ms) {
            if (!ms && ms !== 0) return "-";
            if (ms < 1000) return ms + "ms";
            return (ms / 1000).toFixed(ms >= 10_000 ? 0 : 1) + "s";
        }

        function currentStatusText() {
            if (state.isLoading) return "Generating";
            if (state.error) return "Error";
            if (state.imageBase64) return "Ready";
            return "Idle";
        }

        function currentResponseKind() {
            if (!state.imageBase64 && !state.responseText) return "-";
            if (state.imageBase64 && state.responseText) return "图片 + 文字";
            if (state.imageBase64) return "仅图片";
            return "仅文字";
        }

        function pushLog(message, level) {
            state.logs.unshift({
                time: timestamp(),
                message: message,
                level: level || "info"
            });
            state.logs = state.logs.slice(0, 40);
            renderLogs();
            console.log("[GeminiImageUI] " + message);
        }

        function renderLogs() {
            dom.logsBody.innerHTML = "";
            if (!state.logs.length) {
                const empty = document.createElement("div");
                empty.className = "log-entry";
                empty.innerHTML = "<div class='log-time'>--:--:--</div><div class='log-message'>等待第一条请求日志。</div>";
                dom.logsBody.appendChild(empty);
                return;
            }

            state.logs.forEach(function (entry) {
                const row = document.createElement("div");
                row.className = "log-entry is-" + entry.level;

                const time = document.createElement("div");
                time.className = "log-time";
                time.textContent = entry.time;

                const message = document.createElement("div");
                message.className = "log-message";
                message.textContent = entry.message;

                row.appendChild(time);
                row.appendChild(message);
                dom.logsBody.appendChild(row);
            });
        }

        function updateStatusLine() {
            if (state.isLoading) {
                dom.statusLine.textContent = "正在根据当前 prompt 生成图片...";
                return;
            }

            if (state.error) {
                dom.statusLine.textContent = state.error;
                return;
            }

            if (state.imageBase64) {
                dom.statusLine.textContent = "结果已更新，可继续修改 prompt、重新生成或导出分享海报。";
                return;
            }

            dom.statusLine.textContent = "准备接收 prompt";
        }

        function render() {
            state.prompt = dom.promptInput.value;
            dom.promptCounter.textContent = state.prompt.trim().length + " 字";
            dom.requestCounter.textContent = state.requestCounter ? ("请求 #" + state.requestCounter) : "等待生成";
            dom.chipModel.textContent = modelLabels[state.model] || state.model;
            dom.chipAspect.textContent = state.aspectRatio;
            dom.chipSize.textContent = state.imageSize;

            const hasImage = !!state.imageBase64;
            const imageDataUrl = hasImage ? ("data:" + (state.imageMimeType || "image/png") + ";base64," + state.imageBase64) : "";
            dom.previewImage.src = imageDataUrl;
            dom.previewImage.style.display = hasImage ? "block" : "none";
            dom.placeholderState.style.display = (!state.isLoading && !state.error && !hasImage) ? "block" : "none";
            dom.loadingState.style.display = state.isLoading ? "block" : "none";
            dom.errorState.style.display = (!state.isLoading && !!state.error && !hasImage) ? "block" : "none";
            dom.errorCopy.textContent = state.error || "";

            dom.responsePanel.style.display = state.responseText ? "block" : "none";
            dom.responseCopy.textContent = state.responseText || "";

            dom.generateBtn.disabled = state.isLoading || !state.prompt.trim();
            dom.generateBtn.textContent = state.isLoading ? "生成中..." : "重新生成";
            dom.saveBtn.disabled = !hasImage || state.isLoading;
            dom.shareBtn.disabled = !hasImage || state.isLoading;

            dom.metaStatus.textContent = currentStatusText();
            dom.metaDuration.textContent = state.lastDurationMs == null ? "-" : formatDuration(state.lastDurationMs);
            dom.metaFinishedAt.textContent = state.lastFinishedAt || "-";
            dom.metaResponseKind.textContent = currentResponseKind();

            updateStatusLine();
        }

        async function ensureSettingsLoaded(forceReload) {
            if (state.settingsLoaded && !forceReload) return;

            if (settingsPromise && !forceReload) {
                return settingsPromise;
            }

            settingsPromise = Promise.all([
                swiftBiu.storage.get("apiKey"),
                swiftBiu.storage.get("model"),
                swiftBiu.storage.get("aspectRatio"),
                swiftBiu.storage.get("imageSize")
            ]).then(function (results) {
                state.apiKey = results[0].result || "";
                state.model = results[1].result || "gemini-2.5-flash-image";
                state.aspectRatio = results[2].result || "1:1";
                state.imageSize = results[3].result || "1K";

                if (state.model.indexOf("2.5") !== -1 && (state.imageSize === "2K" || state.imageSize === "4K")) {
                    state.imageSize = "1K";
                }

                state.settingsLoaded = true;
                pushLog("配置已加载，当前模型为 " + (modelLabels[state.model] || state.model) + "。");
                render();
            }).catch(function (error) {
                state.error = "读取插件配置失败：" + (error.message || String(error));
                pushLog(state.error, "error");
                render();
            });

            return settingsPromise;
        }

        function buildGenerationRequest(prompt) {
            const generationConfig = {
                responseModalities: ["IMAGE", "TEXT"]
            };

            if (state.model.indexOf("gemini-3") !== -1) {
                generationConfig.imageConfig = {
                    aspectRatio: state.aspectRatio,
                    imageSize: state.imageSize
                };
            }

            return {
                contents: [{ role: "user", parts: [{ text: prompt }] }],
                generationConfig: generationConfig
            };
        }

        function parseGeminiResponse(responseData) {
            var base64Image = null;
            var imageMimeType = "image/png";
            var textChunks = [];

            var candidates = responseData.candidates || [];
            for (var i = 0; i < candidates.length; i++) {
                var candidate = candidates[i];
                if (!candidate || !candidate.content || !candidate.content.parts) continue;

                for (var j = 0; j < candidate.content.parts.length; j++) {
                    var part = candidate.content.parts[j];
                    if (part.inlineData && part.inlineData.data) {
                        base64Image = part.inlineData.data;
                        if (part.inlineData.mimeType) {
                            imageMimeType = part.inlineData.mimeType;
                        }
                    } else if (part.text) {
                        textChunks.push(part.text.trim());
                    }
                }
            }

            return {
                imageBase64: base64Image,
                imageMimeType: imageMimeType,
                responseText: textChunks.filter(Boolean).join("\n\n")
            };
        }

        async function generateImage(triggerSource) {
            const prompt = dom.promptInput.value.trim();
            state.prompt = prompt;

            if (!prompt) {
                state.error = "请先输入用于生成图片的 prompt。";
                render();
                return;
            }

            await ensureSettingsLoaded(false);

            if (!state.apiKey) {
                state.error = "Gemini API Key 未配置，请先在插件设置里填写。";
                pushLog(state.error, "error");
                render();
                return;
            }

            const requestId = state.requestCounter + 1;
            const startedAt = Date.now();
            state.requestCounter = requestId;
            state.activeRequestId = requestId;
            state.isLoading = true;
            state.error = "";
            state.responseText = "";
            render();

            pushLog(
                "开始生成 #" + requestId +
                "，来源 " + triggerSource +
                "，模型 " + (modelLabels[state.model] || state.model) +
                "，prompt " + prompt.length + " 字。"
            );

            const url = "https://generativelanguage.googleapis.com/v1beta/models/" + state.model + ":generateContent?key=" + encodeURIComponent(state.apiKey);
            const options = {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(buildGenerationRequest(prompt))
            };

            try {
                const response = await swiftBiu.fetch(url, options);

                if (requestId !== state.activeRequestId) {
                    pushLog("忽略过期成功响应 #" + requestId + "。", "warning");
                    return;
                }

                pushLog("收到响应 #" + requestId + "，HTTP " + response.status + "。");

                if (response.status && response.status >= 400) {
                    let errorInfo = response.data || "Unknown error";
                    try {
                        const errObj = JSON.parse(errorInfo);
                        if (errObj.error && errObj.error.message) {
                            errorInfo = errObj.error.message;
                        }
                    } catch (ignored) {}

                    throw new Error(errorInfo);
                }

                const responseData = JSON.parse(response.data || "{}");
                if (responseData.error) {
                    throw new Error(responseData.error.message || "Unknown API error");
                }

                const parsed = parseGeminiResponse(responseData);
                state.responseText = parsed.responseText || "";
                state.lastDurationMs = Date.now() - startedAt;
                state.lastFinishedAt = new Date().toLocaleString();

                if (parsed.imageBase64) {
                    state.imageBase64 = parsed.imageBase64;
                    state.imageMimeType = parsed.imageMimeType || "image/png";
                    pushLog(
                        "图片生成完成 #" + requestId +
                        "，耗时 " + formatDuration(state.lastDurationMs) +
                        (state.responseText ? "，包含文字响应。" : "。"),
                        "success"
                    );
                } else {
                    state.imageBase64 = "";
                    throw new Error(state.responseText ? "模型没有返回图片，仅返回了文字说明。" : "模型未返回图片数据。");
                }
            } catch (error) {
                if (requestId !== state.activeRequestId) {
                    pushLog("忽略过期失败响应 #" + requestId + "。", "warning");
                    return;
                }

                state.error = error.message || String(error);
                state.lastDurationMs = Date.now() - startedAt;
                state.lastFinishedAt = new Date().toLocaleString();
                pushLog("生成失败 #" + requestId + "：" + state.error, "error");
            } finally {
                if (requestId === state.activeRequestId) {
                    state.isLoading = false;
                    render();
                }
            }
        }

        function fileExtensionForMimeType(mimeType) {
            if (!mimeType) return "png";
            if (mimeType.indexOf("jpeg") !== -1 || mimeType.indexOf("jpg") !== -1) return "jpg";
            if (mimeType.indexOf("webp") !== -1) return "webp";
            if (mimeType.indexOf("gif") !== -1) return "gif";
            return "png";
        }

        function safeFilenamePrefix(value) {
            return (value || "nano-banana")
                .toLowerCase()
                .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
                .replace(/^-+|-+$/g, "")
                .slice(0, 32) || "nano-banana";
        }

        function currentImageDataUrl() {
            return "data:" + (state.imageMimeType || "image/png") + ";base64," + state.imageBase64;
        }

        function loadImage(src) {
            return new Promise(function (resolve, reject) {
                const image = new Image();
                image.onload = function () { resolve(image); };
                image.onerror = function () { reject(new Error("Image failed to load.")); };
                image.src = src;
            });
        }

        function roundedRect(ctx, x, y, width, height, radius) {
            const r = Math.min(radius, width / 2, height / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + width, y, x + width, y + height, r);
            ctx.arcTo(x + width, y + height, x, y + height, r);
            ctx.arcTo(x, y + height, x, y, r);
            ctx.arcTo(x, y, x + width, y, r);
            ctx.closePath();
        }

        function wrapText(ctx, text, maxWidth) {
            if (!text) return [];

            const lines = [];
            const paragraphs = text.split(/\n+/);

            paragraphs.forEach(function (paragraph) {
                if (!paragraph.trim()) {
                    lines.push("");
                    return;
                }

                let current = "";
                for (let i = 0; i < paragraph.length; i++) {
                    const next = current + paragraph[i];
                    if (ctx.measureText(next).width > maxWidth && current) {
                        lines.push(current);
                        current = paragraph[i];
                    } else {
                        current = next;
                    }
                }

                if (current) lines.push(current);
            });

            return lines;
        }

        async function buildSharePosterBase64() {
            const sourceImage = await loadImage(currentImageDataUrl());
            const measureCanvas = document.createElement("canvas");
            const measureCtx = measureCanvas.getContext("2d");

            const canvasWidth = 1600;
            const panelPadding = 112;
            const contentWidth = canvasWidth - panelPadding * 2;

            measureCtx.font = "700 48px 'SF Pro Display', 'PingFang SC', sans-serif";
            const promptLines = wrapText(measureCtx, state.prompt.trim(), contentWidth).slice(0, 8);

            measureCtx.font = "500 34px 'SF Pro Text', 'PingFang SC', sans-serif";
            const responseLines = wrapText(measureCtx, state.responseText.trim(), contentWidth).slice(0, 8);

            const imageWidth = contentWidth;
            const imageHeight = Math.min(860, imageWidth * (sourceImage.height / sourceImage.width));
            const promptHeight = Math.max(120, promptLines.length * 60 + 24);
            const responseHeight = responseLines.length ? (responseLines.length * 42 + 120) : 0;
            const canvasHeight = Math.round(300 + promptHeight + imageHeight + responseHeight + 240);

            const canvas = document.createElement("canvas");
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            const ctx = canvas.getContext("2d");

            const gradient = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
            gradient.addColorStop(0, "#f7e8d4");
            gradient.addColorStop(0.45, "#f6efe7");
            gradient.addColorStop(1, "#ece4d7");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            ctx.fillStyle = "rgba(214, 125, 57, 0.18)";
            ctx.beginPath();
            ctx.arc(canvasWidth - 140, 120, 170, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(108, 177, 158, 0.14)";
            ctx.beginPath();
            ctx.arc(120, canvasHeight - 110, 160, 0, Math.PI * 2);
            ctx.fill();

            const cardX = 56;
            const cardY = 56;
            const cardWidth = canvasWidth - 112;
            const cardHeight = canvasHeight - 112;

            ctx.shadowColor = "rgba(96, 54, 18, 0.18)";
            ctx.shadowBlur = 48;
            ctx.shadowOffsetY = 20;
            ctx.fillStyle = "rgba(255, 252, 247, 0.94)";
            roundedRect(ctx, cardX, cardY, cardWidth, cardHeight, 42);
            ctx.fill();
            ctx.shadowColor = "transparent";

            let y = 126;
            ctx.fillStyle = "#d26f32";
            ctx.font = "700 24px 'SF Pro Display', 'PingFang SC', sans-serif";
            ctx.fillText("NANO BANANA", 112, y);

            y += 52;
            ctx.fillStyle = "#24180f";
            ctx.font = "800 66px 'SF Pro Display', 'PingFang SC', sans-serif";
            ctx.fillText("Prompt to Image", 112, y);

            y += 56;
            ctx.fillStyle = "#8a6f58";
            ctx.font = "500 28px 'SF Pro Text', 'PingFang SC', sans-serif";
            ctx.fillText("Prompt", 112, y);

            y += 20;
            ctx.fillStyle = "#2c2016";
            ctx.font = "700 48px 'SF Pro Display', 'PingFang SC', sans-serif";
            promptLines.forEach(function (line) {
                y += 60;
                ctx.fillText(line, 112, y);
            });

            y += 52;
            ctx.fillStyle = "#f1d6ba";
            roundedRect(ctx, 112, y, imageWidth, imageHeight, 34);
            ctx.fill();

            ctx.save();
            roundedRect(ctx, 112, y, imageWidth, imageHeight, 34);
            ctx.clip();
            ctx.drawImage(sourceImage, 112, y, imageWidth, imageHeight);
            ctx.restore();

            y += imageHeight + 56;
            if (responseLines.length) {
                ctx.fillStyle = "#8a6f58";
                ctx.font = "500 28px 'SF Pro Text', 'PingFang SC', sans-serif";
                ctx.fillText("Response Note", 112, y);

                y += 24;
                ctx.fillStyle = "rgba(215, 201, 187, 0.48)";
                roundedRect(ctx, 112, y, imageWidth, responseHeight, 28);
                ctx.fill();

                y += 58;
                ctx.fillStyle = "#433123";
                ctx.font = "500 34px 'SF Pro Text', 'PingFang SC', sans-serif";
                responseLines.forEach(function (line) {
                    ctx.fillText(line, 144, y);
                    y += 42;
                });

                y += 34;
            }

            const footerTop = canvasHeight - 200;
            ctx.fillStyle = "#8a6f58";
            ctx.font = "600 24px 'SF Pro Text', 'PingFang SC', sans-serif";
            ctx.fillText("Model", 112, footerTop);
            ctx.fillText("Aspect", 430, footerTop);
            ctx.fillText("Size", 690, footerTop);
            ctx.fillText("Generated", 930, footerTop);

            ctx.fillStyle = "#2c2016";
            ctx.font = "700 26px 'SF Pro Display', 'PingFang SC', sans-serif";
            ctx.fillText(modelLabels[state.model] || state.model, 112, footerTop + 40);
            ctx.fillText(state.aspectRatio, 430, footerTop + 40);
            ctx.fillText(state.imageSize, 690, footerTop + 40);
            ctx.fillText(state.lastFinishedAt || new Date().toLocaleString(), 930, footerTop + 40);

            ctx.fillStyle = "#b88c67";
            ctx.font = "600 22px 'SF Pro Text', 'PingFang SC', sans-serif";
            ctx.fillText("Made with SwiftBiu", 112, canvasHeight - 92);

            return canvas.toDataURL("image/png").split(",")[1];
        }

        async function saveCurrentImage() {
            if (!state.imageBase64) return;

            try {
                const filename = safeFilenamePrefix(state.prompt) + "." + fileExtensionForMimeType(state.imageMimeType);
                await swiftBiu.exportFile(state.imageBase64, filename);
                pushLog("已打开系统保存面板，用于导出原图。", "success");
            } catch (error) {
                state.error = "导出原图失败：" + (error.message || String(error));
                pushLog(state.error, "error");
                render();
            }
        }

        async function exportSharePoster() {
            if (!state.imageBase64) return;

            try {
                pushLog("开始合成分享海报。");
                const posterBase64 = await buildSharePosterBase64();
                const filename = safeFilenamePrefix(state.prompt) + "-share-poster.png";
                await swiftBiu.exportFile(posterBase64, filename);
                pushLog("分享海报已生成，系统保存面板已打开。", "success");
            } catch (error) {
                state.error = "导出分享海报失败：" + (error.message || String(error));
                pushLog(state.error, "error");
                render();
            }
        }

        async function copyPrompt() {
            const prompt = dom.promptInput.value.trim();
            if (!prompt) return;

            try {
                await swiftBiu.copyText(prompt);
                pushLog("Prompt 已复制到剪贴板。", "success");
            } catch (error) {
                state.error = "复制 prompt 失败：" + (error.message || String(error));
                pushLog(state.error, "error");
                render();
            }
        }

        function bindEvents() {
            dom.promptInput.addEventListener("input", render);
            dom.promptInput.addEventListener("keydown", function (event) {
                if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
                    event.preventDefault();
                    generateImage("keyboard-shortcut");
                }
            });

            dom.generateBtn.addEventListener("click", function () {
                generateImage("manual-regenerate");
            });
            dom.copyPromptBtn.addEventListener("click", copyPrompt);
            dom.saveBtn.addEventListener("click", saveCurrentImage);
            dom.shareBtn.addEventListener("click", exportSharePoster);
        }

        window.swiftBiu_initialize = async function (context) {
            bindEvents();
            window.swiftBiu_initialize = null;
            window.swiftBiu_updateContext(context);
        };

        window.swiftBiu_updateContext = async function (context) {
            const nextPrompt = (context && context.selectedText ? context.selectedText : "").trim();
            if (nextPrompt) {
                dom.promptInput.value = nextPrompt;
                state.prompt = nextPrompt;
            }

            render();
            await ensureSettingsLoaded(false);

            if (nextPrompt) {
                generateImage("context-update");
            } else {
                pushLog("窗口已打开，但当前没有可用的选中文本。", "warning");
            }
        };

        renderLogs();
        render();
    </script>
</body>
