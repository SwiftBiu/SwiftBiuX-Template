<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggregate Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            background-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .frosted-glass {
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.7);
        }

        @media (prefers-color-scheme: dark) {
            .frosted-glass {
                background-color: rgba(30, 30, 30, 0.75);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 4px;
        }

        .card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        @media (prefers-color-scheme: dark) {
            .card {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>

<body class="text-zinc-900 dark:text-zinc-100">
    <div id="container"
        class="frosted-glass rounded-xl shadow-2xl border border-white/20 dark:border-white/10 flex flex-col h-screen max-h-screen overflow-hidden">
        <!-- Header -->
        <header class="p-4 border-b border-black/5 dark:border-white/5 flex items-center justify-between flex-shrink-0">
            <h1 class="text-sm font-bold opacity-60">AGGREGATE TRANSLATOR</h1>
            <div class="flex items-center gap-2">
                <select id="target-lang"
                    class="bg-black/5 dark:bg-white/5 border-none rounded-md px-2 py-1 text-xs focus:ring-1 focus:ring-blue-500 outline-none">
                    <option value="zh-CN">Chinese (Simplified)</option>
                    <option value="en">English</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="es">Spanish</option>
                </select>
            </div>
        </header>

        <!-- Source Text -->
        <div class="px-4 py-3 bg-black/5 dark:bg-white/5 flex-shrink-0">
            <div id="source-text"
                class="text-sm italic opacity-80 whitespace-pre-wrap max-h-24 overflow-y-auto custom-scrollbar"></div>
        </div>

        <!-- Results Management -->
        <main id="results-list" class="flex-grow overflow-y-auto p-4 space-y-4 custom-scrollbar">
            <!-- Cards will be injected here -->
        </main>
    </div>

    <script>
        // --- State ---
        let selectedText = "";
        let targetLanguage = "zh-CN";
        let config = {};

        // --- DOM ---
        const dom = {
            sourceText: document.getElementById('source-text'),
            resultsList: document.getElementById('results-list'),
            targetLangSelect: document.getElementById('target-lang')
        };

        // --- Initialization ---
        window.swiftBiu_initialize = async (context) => {
            selectedText = context.selectedText || "";
            dom.sourceText.textContent = selectedText;

            // Load config
            await loadConfig();

            // Initial call
            triggerAllTranslations();
        };

        async function loadConfig() {
            const keys = [
                'enable_google_web', 'enable_lingva', 'enable_mymemory',
                'deepl_api_key', 'deepl_plan',
                'gemini_api_key', 'gemini_model',
                'openai_api_key', 'openai_api_url', 'openai_model',
                'custom_openai_providers', 'custom_http_providers'
            ];

            for (const key of keys) {
                const resp = await window.swiftBiu.storage.get(key);
                config[key] = resp.result;
            }
        }

        // --- Rendering ---
        function createCard(id, title) {
            const card = document.createElement('div');
            card.id = `card-${id}`;
            card.className = "card p-4 rounded-lg space-y-2";
            card.innerHTML = `
                <div class="flex items-center justify-between border-b border-black/5 dark:border-white/5 pb-2">
                    <span class="text-[10px] font-bold tracking-wider opacity-40 uppercase">${title}</span>
                    <button onclick="copyResult('${id}')" class="opacity-30 hover:opacity-100 transition-opacity">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                    </button>
                </div>
                <div class="result-content text-sm leading-relaxed min-h-[1.5em] flex items-center">
                    <div class="loading-spinner animate-pulse flex space-x-1">
                        <div class="h-1.5 w-1.5 bg-blue-500 rounded-full"></div>
                        <div class="h-1.5 w-1.5 bg-blue-500 rounded-full" style="animation-delay: 0.2s"></div>
                        <div class="h-1.5 w-1.5 bg-blue-500 rounded-full" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `;
            dom.resultsList.appendChild(card);
            return card;
        }

        function updateCardResult(id, text) {
            const card = document.getElementById(`card-${id}`);
            if (!card) return;
            const content = card.querySelector('.result-content');
            content.innerHTML = `<p>${text}</p>`;
        }

        function updateCardError(id, error) {
            const card = document.getElementById(`card-${id}`);
            if (!card) return;
            const content = card.querySelector('.result-content');
            content.innerHTML = `<p class="text-red-500/70 text-xs italic">${error}</p>`;
        }

        async function copyResult(id) {
            const card = document.getElementById(`card-${id}`);
            const text = card.querySelector('.result-content p')?.textContent;
            if (text) {
                await window.swiftBiu.copyText(text);
                const btn = card.querySelector('button');
                const originalContent = btn.innerHTML;
                btn.innerHTML = '✅';
                setTimeout(() => btn.innerHTML = originalContent, 1000);
            }
        }

        // --- Translators ---

        async function fetchGoogleWeb(text, target) {
            // Use mobile web scraper for more stability
            const url = `https://translate.google.com/m?q=${encodeURIComponent(text)}&sl=auto&tl=${target}`;
            const resp = await window.swiftBiu.fetch(url, {
                method: 'GET',
                headers: { 'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/14.0 Mobile/15E148 Safari/604.1' }
            });
            if (resp.status !== 200) throw new Error("Google Web status " + resp.status);

            // Basic HTML parsing for the result-container
            const match = resp.data.match(/class="result-container">([\s\S]*?)<\/div>/);
            if (match && match[1]) {
                return match[1].trim();
            }

            // Fallback to gtx if scraper fails
            const gtxUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
            const gtxResp = await window.swiftBiu.fetch(gtxUrl, { method: 'GET' });
            if (gtxResp.status === 200) {
                const data = JSON.parse(gtxResp.data);
                return data[0].map(s => s[0]).join('');
            }

            throw new Error("Could not parse result");
        }

        async function fetchLingva(text, target) {
            // Lingva is a stable Google Translate proxy
            const url = `https://lingva.ml/api/v1/auto/${target}/${encodeURIComponent(text)}`;
            const resp = await window.swiftBiu.fetch(url, { method: 'GET' });
            if (resp.status !== 200) throw new Error("Lingva status " + resp.status);
            const data = JSON.parse(resp.data);
            return data.translation;
        }

        async function fetchMyMemory(text, target) {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=auto|${target}`;
            const resp = await window.swiftBiu.fetch(url, { method: 'GET' });
            if (resp.status !== 200) throw new Error("MyMemory status " + resp.status);
            const data = JSON.parse(resp.data);
            return data.responseData.translatedText;
        }

        async function fetchDeepL(text, target, apiKey, plan) {
            const domain = plan === 'pro' ? 'api.deepl.com' : 'api-free.deepl.com';
            const url = `https://${domain}/v2/translate`;
            const resp = await window.swiftBiu.fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `DeepL-Auth-Key ${apiKey}`, 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `text=${encodeURIComponent(text)}&target_lang=${target.toUpperCase()}`
            });
            if (resp.status !== 200) throw new Error("DeepL status " + resp.status);
            const data = JSON.parse(resp.data);
            return data.translations[0].text;
        }

        async function fetchGemini(text, target, apiKey, model) {
            const chatModel = model || "gemini-1.5-flash";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${chatModel}:generateContent?key=${apiKey}`;
            const prompt = `Translate the following text to ${target}. Output ONLY the translated text.\n\nText: ${text}`;
            const resp = await window.swiftBiu.fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (resp.status !== 200) throw new Error("Gemini status " + resp.status);
            const data = JSON.parse(resp.data);
            return data.candidates[0].content.parts[0].text.trim();
        }

        async function fetchOpenAI(text, target, apiKey, apiUrl, model) {
            const url = `${apiUrl}/chat/completions`;
            const prompt = `Translate the following text to ${target}. Output ONLY the translated text.\n\nText: ${text}`;
            const resp = await window.swiftBiu.fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: model || "gpt-4o-mini",
                    messages: [{ role: "user", content: prompt }]
                })
            });
            if (resp.status !== 200) throw new Error("OpenAI status " + resp.status);
            const data = JSON.parse(resp.data);
            return data.choices[0].message.content.trim();
        }

        function getValueByPath(obj, path) {
            if (!path) return obj;
            return path.split('.').reduce((acc, part) => acc && acc[part], obj);
        }

        async function triggerAllTranslations() {
            dom.resultsList.innerHTML = "";
            targetLanguage = dom.targetLangSelect.value;
            const tasks = [];

            // 1. Google Web (Web Aggregation)
            if (config.enable_google_web !== "false") {
                createCard('google-web', 'Google Web');
                tasks.push((async () => {
                    try {
                        const res = await fetchGoogleWeb(selectedText, targetLanguage);
                        updateCardResult('google-web', res);
                    } catch (e) {
                        updateCardError('google-web', e.message);
                    }
                })());
            }

            // 2. Lingva (Web Aggregation)
            if (config.enable_lingva === "true") {
                createCard('lingva', 'Lingva (Google Proxy)');
                tasks.push((async () => {
                    try {
                        const res = await fetchLingva(selectedText, targetLanguage);
                        updateCardResult('lingva', res);
                    } catch (e) {
                        updateCardError('lingva', e.message);
                    }
                })());
            }

            // 3. MyMemory
            if (config.enable_mymemory === "true") {
                createCard('mymemory', 'MyMemory');
                tasks.push((async () => {
                    try {
                        const res = await fetchMyMemory(selectedText, targetLanguage);
                        updateCardResult('mymemory', res);
                    } catch (e) {
                        updateCardError('mymemory', e.message);
                    }
                })());
            }

            // 4. DeepL
            if (config.deepl_api_key) {
                createCard('deepl', 'DeepL');
                tasks.push((async () => {
                    try {
                        const res = await fetchDeepL(selectedText, targetLanguage, config.deepl_api_key, config.deepl_plan);
                        updateCardResult('deepl', res);
                    } catch (e) {
                        updateCardError('deepl', e.message);
                    }
                })());
            }

            // 5. Gemini
            if (config.gemini_api_key) {
                createCard('gemini', 'Gemini');
                tasks.push((async () => {
                    try {
                        const res = await fetchGemini(selectedText, targetLanguage, config.gemini_api_key, config.gemini_model);
                        updateCardResult('gemini', res);
                    } catch (e) {
                        updateCardError('gemini', e.message);
                    }
                })());
            }

            // 6. OpenAI
            if (config.openai_api_key) {
                createCard('openai', 'OpenAI');
                tasks.push((async () => {
                    try {
                        const res = await fetchOpenAI(selectedText, targetLanguage, config.openai_api_key, config.openai_api_url, config.openai_model);
                        updateCardResult('openai', res);
                    } catch (e) {
                        updateCardError('openai', e.message);
                    }
                })());
            }

            // 7. Custom AI Providers
            if (config.custom_openai_providers) {
                try {
                    const providers = JSON.parse(config.custom_openai_providers);
                    providers.forEach((p, idx) => {
                        if (p.enabled) {
                            const id = `custom-openai-${idx}`;
                            createCard(id, p.name || 'AI');
                            tasks.push((async () => {
                                try {
                                    const res = await fetchOpenAI(selectedText, targetLanguage, p.key, p.url, p.model);
                                    updateCardResult(id, res);
                                } catch (e) {
                                    updateCardError(id, e.message);
                                }
                            })());
                        }
                    });
                } catch (e) { }
            }

            // 8. Generic HTTP
            if (config.custom_http_providers) {
                try {
                    const providers = JSON.parse(config.custom_http_providers);
                    providers.forEach((p, idx) => {
                        if (p.enabled) {
                            const id = `custom-http-${idx}`;
                            createCard(id, p.name || 'HTTP');
                            tasks.push((async () => {
                                try {
                                    const processedUrl = p.url.replace('{text}', encodeURIComponent(selectedText)).replace('{target}', targetLanguage);
                                    let body = p.body;
                                    if (body && typeof body === 'string') {
                                        body = body.replace('{text}', selectedText).replace('{target}', targetLanguage);
                                    }
                                    const fetchOpts = { method: p.method || 'GET' };
                                    if (p.headers) {
                                        try { fetchOpts.headers = JSON.parse(p.headers); } catch (e) { }
                                    }
                                    if (p.method === 'POST' && body) fetchOpts.body = body;
                                    const resp = await window.swiftBiu.fetch(processedUrl, fetchOpts);
                                    if (resp.status !== 200) throw new Error("Status " + resp.status);
                                    const data = JSON.parse(resp.data);
                                    const res = getValueByPath(data, p.path);
                                    if (!res) throw new Error("Path failed: " + p.path);
                                    updateCardResult(id, res);
                                } catch (e) {
                                    updateCardError(id, e.message);
                                }
                            })());
                        }
                    });
                } catch (e) { }
            }

            await Promise.allSettled(tasks);
        }

        // --- Event Listeners ---
        dom.targetLangSelect.addEventListener('change', () => {
            triggerAllTranslations();
        });

    </script>
</body>

</html>
